<!DOCTYPE html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>唐春雨我爱你-终极版</title><style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}#love{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:6vw;font-weight:900;color:#fff;text-shadow:0 0 30px #ff4da6;pointer-events:none;animation:spin 10s linear infinite}@keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}</style></head><body><div id='love'>❤ 唐春雨我爱你 ❤</div><script src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js'></script><script>const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,10000);const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);camera.position.z=800;const g=new THREE.BufferGeometry();const p=[];for(let i=0;i<12000;i++){const r=Math.random()*2500,a=Math.random()*20;p.push(Math.cos(a)*r,(Math.random()-.5)*600,Math.sin(a)*r)}g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));const galaxy=new THREE.Points(g,new THREE.PointsMaterial({size:3,color:0xffffff}));scene.add(galaxy);const hearts=[];for(let i=0;i<3000;i++){const m=new THREE.Mesh(new THREE.SphereGeometry(1),new THREE.MeshBasicMaterial({color:0xff4da6}));scene.add(m);hearts.push(m)}let mode=0;setInterval(()=>mode=(mode+1)%3,5000);function morph(){hearts.forEach((h,i)=>{let t=i/hearts.length*Math.PI*2;if(mode===0){let x=16*Math.pow(Math.sin(t),3)*18;let y=(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*18;h.position.set(x,y,(Math.random()-.5)*120)}else if(mode===1){h.position.set(Math.sin(i*.08)*350,(i%120-60)*8,Math.cos(i*.08)*350)}else{let r=150+Math.random()*250;h.position.set(Math.cos(t)*r,Math.sin(t)*r,(Math.random()-.5)*300)}})}setInterval(morph,120);function boom(x,y){for(let i=0;i<150;i++){let e=document.createElement('div');e.innerHTML='❤';e.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;color:#ff4da6;pointer-events:none';document.body.appendChild(e);let dx=(Math.random()-.5)*400,dy=(Math.random()-.5)*400,s=0;let id=setInterval(()=>{s+=.03;e.style.transform='translate('+(dx*s)+'px,'+(dy*s)+'px)';e.style.opacity=1-s;if(s>1){clearInterval(id);e.remove()}},16)}}document.onclick=e=>boom(e.clientX,e.clientY);function animate(){requestAnimationFrame(animate);galaxy.rotation.y+=0.001;camera.position.z=800+Math.sin(Date.now()/250)*300;scene.rotation.y+=0.002;renderer.render(scene,camera)}animate();window.addEventListener('deviceorientation',e=>{scene.rotation.x=(e.beta||0)/100});onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)};</script></body></html>
