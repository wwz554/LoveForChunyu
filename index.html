<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>唐春雨我爱你</title><style>body{margin:0;overflow:hidden;background:#000}#intro{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;color:#ff4fa0;font-size:120px;z-index:9;animation:beat 1s infinite}#love{position:fixed;inset:0;display:none;justify-content:center;align-items:center;font-size:5vw;font-weight:900;color:#fff;text-shadow:0 0 30px #ff4fa0;pointer-events:none;z-index:8}@keyframes beat{50%{transform:scale(1.2)}}canvas{display:block}</style></head><body><div id='intro'>❤</div><div id='love'>唐春雨我爱你 ❤</div><audio autoplay loop><source src='https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8c278d3.mp3'></audio><script src='https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js'></script><script>let scene=new THREE.Scene();let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,5000);let renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);camera.position.z=200;for(let i=0;i<2000;i++){let g=new THREE.SphereGeometry(.4);let m=new THREE.MeshBasicMaterial({color:0xffffff});let s=new THREE.Mesh(g,m);s.position.set((Math.random()-.5)*3000,(Math.random()-.5)*3000,(Math.random()-.5)*3000);scene.add(s)}let hearts=[];function createHeart(){let g=new THREE.SphereGeometry(1.5);let m=new THREE.MeshBasicMaterial({color:0xff3d8b});let h=new THREE.Mesh(g,m);let t=Math.random()*Math.PI*2;let x=16*Math.pow(Math.sin(t),3);let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);h.position.set(x*6,y*6,(Math.random()-.5)*50);scene.add(h);hearts.push(h)}for(let i=0;i<1200;i++)createHeart();function meteor(){let d=document.createElement('div');d.style.cssText='position:fixed;width:2px;height:120px;background:linear-gradient(white,transparent);left:'+Math.random()*100+'vw;top:-150px;transform:rotate(35deg);z-index:3';document.body.appendChild(d);let y=-150;let x=parseFloat(d.style.left);let a=setInterval(()=>{y+=25;x+=15;d.style.top=y+'px';d.style.left=x+'px';if(y>innerHeight){clearInterval(a);d.remove()}},16)}setInterval(meteor,300);document.addEventListener('mousemove',e=>{for(let i=0;i<15;i++){let h=document.createElement('div');h.innerHTML='❤';h.style.cssText='position:fixed;color:#ff4fa0;left:'+e.clientX+'px;top:'+e.clientY+'px;pointer-events:none';document.body.appendChild(h);let dy=0;let id=setInterval(()=>{dy+=3;h.style.transform='translate('+(Math.random()*60-30)+'px,'+dy+'px)';h.style.opacity=1-dy/100;if(dy>100){clearInterval(id);h.remove()}},16)}});setTimeout(()=>{document.getElementById('intro').style.display='none';document.getElementById('love').style.display='flex';},4000);if(window.DeviceOrientationEvent){window.addEventListener('deviceorientation',e=>{scene.rotation.y=(e.gamma||0)/50;scene.rotation.x=(e.beta||0)/100})}function animate(){requestAnimationFrame(animate);scene.rotation.y+=0.001;renderer.render(scene,camera)}animate();onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)};</script></body></html>
