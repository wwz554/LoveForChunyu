<!DOCTYPE html><html lang='zh-CN'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>唐春雨我爱你</title><style>*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:radial-gradient(circle at center,#1a0033,#000);height:100vh;font-family:'Microsoft YaHei',sans-serif;perspective:1200px}.stars{position:fixed;width:100%;height:100%;transform-style:preserve-3d}.msg{position:absolute;font-size:32px;font-weight:bold;white-space:nowrap;background:linear-gradient(90deg,#ff4fd8,#ff77aa,#ffffff,#ff77aa,#ff4fd8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 20px rgba(255,100,200,.8);animation:fly linear infinite}.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;font-weight:900;background:linear-gradient(45deg,#ff0080,#ff66cc,#ffffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(255,0,128,.9);animation:pulse 2s infinite}@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.08)}}@keyframes fly{from{transform:translateZ(-2000px)}to{transform:translateZ(1200px)}}.heart{position:absolute;color:#ff3d8b;font-size:22px;animation:float 8s linear infinite}@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}canvas{position:fixed;inset:0}</style></head><body><canvas id='bg'></canvas><div class='center'>❤ 唐春雨我爱你 ❤</div><div class='stars' id='stars'></div><script>const stars=document.getElementById('stars');for(let i=0;i<120;i++){let d=document.createElement('div');d.className='msg';d.innerText='唐春雨我爱你 ❤';d.style.left=Math.random()*100+'vw';d.style.top=Math.random()*100+'vh';d.style.animationDuration=(6+Math.random()*12)+'s';d.style.fontSize=(18+Math.random()*30)+'px';stars.appendChild(d)}for(let i=0;i<80;i++){let h=document.createElement('div');h.className='heart';h.innerHTML='❤';h.style.left=Math.random()*100+'vw';h.style.animationDuration=(5+Math.random()*10)+'s';h.style.fontSize=(10+Math.random()*40)+'px';document.body.appendChild(h)}const c=document.getElementById('bg');const ctx=c.getContext('2d');function resize(){c.width=innerWidth;c.height=innerHeight}resize();onresize=resize;let pts=[];for(let i=0;i<200;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.8)';ctx.fill();p.y+=0.2;if(p.y>c.height)p.y=0});requestAnimationFrame(draw)}draw();</script></body></html>
